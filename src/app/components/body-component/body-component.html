<main>
    <h1>FILM CONSIGLIATI</h1>
    <section class="card-container">
        <div class="card" *ngFor="let film of films">
            <div class="image">
                <img [src]="film.copertina" alt="">
                <div class="dark-overlay"></div>
                <div class="duration">
                    {{ film.durata ? formatDuration(film.durata) : '' }}
                </div>
            </div>
            <div class="details">
                <h3>{{ film.titolo }}</h3>
                <h4>{{ film.anno }}</h4>
            </div>
        </div>
    </section>
</main>
