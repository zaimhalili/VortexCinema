<main>
    <h1>Film consigliati</h1>
    <section class="card-container" *ngIf="films.length > 0">
        <div class="card" *ngFor="let film of films">
            <div class="image">
                <img [src]="film.copertina" alt="Copertina">
                <div class="dark-overlay"></div>
                <div class="duration">{{film.durata}}</div>
            </div>
            <div class="details">
                <h3>{{film.titolo}}</h3>
                <h4>{{film.anno}}</h4>
            </div>
        </div>
    </section>
</main>
