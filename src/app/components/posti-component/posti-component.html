<div id="biglietti">
    <div class="biglietti-container">

        <div id="tipo-biglietti">
            <div class="biglietti-header">
                <h1>Scegli i Posti</h1>
                <p class="subtitle">Seleziona i posti disponibili per una visione unica</p>
            </div>
            <p class="domanda">Quanti biglietti a prezzo intero?</p>
            <div class="input-number">
                <button class="add" (click)="changeBigliettoIntero(1, false)">-</button>
                <input type="number" name="" id="" class="numBiglietti" placeholder="Biglietti a prezzo intero..."
                    value="1" min="0" minlength="0" maxlength="3">
                <button class="add" (click)="changeBigliettoIntero(1, true)">+</button>
            </div>

            <p class="domanda">Quanti biglietti sono a prezzi riddoti?</p>
            <div class="input-number">
                <button class="add" (click)="changeBigliettoRidotto(1, false)">-</button>
                <input type="number" name="" id="" class="numBiglietti" placeholder="Biglietti a prezzo ridotto...">
                <button class="add" (click)="changeBigliettoRidotto(1, true)">+</button>
            </div>

            <div>Prezzo Totale: <strong>$27.92</strong></div>
            <button class="confirm-button">CONFERMA PRENOTAZIONE</button>

        </div>

        <div class="biglietti-content">
            <div class="screen-label">SCHERMO</div>
            <div class="seats-grid">
                <div *ngFor="let row of rows; let rowIndex = index" class="seat-row">
                    <div class="row-label"><b>{{ rowIndex + 1 }}</b></div>
                    <div class="seats-container">
                        <button (click)="selezionaSedia(rowIndex, seat)" *ngFor="let seat of row" class="seat"
                            [class.disabled]="isSeatOccupied(rowIndex, seat)" [attr.data-row]=" rowIndex + 1"
                            [attr.data-seat]="seat"
                            [disabled]="isSeatOccupied(rowIndex, seat)">
                            {{ seat }}
                        </button>
                    </div>
                </div>
            </div>

            <div class="seats-legend">
                <div class="legend-item">
                    <div class="legend-seat available"></div>
                    <span>Disponibile</span>
                </div>
                <div class="legend-item">
                    <div class="legend-seat selected"></div>
                    <span>Selezionato</span>
                </div>
                <div class="legend-item">
                    <div class="legend-seat occupied"></div>
                    <span>Occupato</span>
                </div>
            </div>
        </div>

    </div>
</div>
