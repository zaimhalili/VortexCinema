<div id="biglietti">
    <div class="biglietti-container">

        <!-- LEFT PANEL: selected tickets -->
        <div id="tipo-biglietti">
            <div class="biglietti-header">
                <h1>Scegli i Posti</h1>
                <p class="subtitle">Seleziona i posti disponibili per una visione unica</p>
            </div>

            <div class="scroll-area">
                <div *ngIf="selectedSeats.length === 0" class="empty-state">
                    <i class="fa-solid fa-ticket"></i>
                    <span>Nessun posto selezionato</span>
                </div>

                <div class="ticket-card" *ngFor="let s of selectedSeats">
                    <div class="ticket-left">
                        <span class="ticket-label">FILA</span>
                        <span class="ticket-value">{{ s.fila }}</span>
                    </div>
                    <div class="ticket-divider">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                    <div class="ticket-center">
                        <span class="ticket-label">POSTO</span>
                        <span class="ticket-value">{{ s.posto }}</span>
                    </div>
                    <div class="ticket-toggle">
                        <button class="toggle-btn" [class.active]="s.tipo === 'INTERO'"
                            (click)="changeTipo(s, 'INTERO')">
                            Intero<br><small>€10</small>
                        </button>
                        <button class="toggle-btn" [class.active]="s.tipo === 'RIDOTTO'"
                            (click)="changeTipo(s, 'RIDOTTO')">
                            Ridotto<br><small>€7</small>
                        </button>
                    </div>
                    <button class="ticket-remove" type="button" (click)="removeSelectedSeat(s.fila, s.posto)">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>

            <div class="price-row">
                <span>Totale</span>
                <strong class="price-amount">€{{ prezzo }}</strong>
            </div>

            <button class="confirm-button" (click)="confermaPrenotazione()"
                [disabled]="isProcessing || selectedSeats.length === 0">
                {{ isProcessing ? 'Elaborazione...' : 'Acquista Biglietti' }}
            </button>
        </div>

        <!-- RIGHT PANEL: seat map -->
        <div class="biglietti-content">
            <div class="screen-label">SCHERMO</div>

            <div class="seats-grid">
                

                <div *ngFor="let row of rows; let rowIndex = index" class="seat-row">
                    <div class="row-label"><b>{{ rowIndex + 1 }}</b></div>
                    <div class="seats-container">
                        <button (click)="selezionaSedia(rowIndex, seat)" *ngFor="let seat of row" class="seat"
                            [class.disabled]="isSeatOccupied(rowIndex, seat)"
                            [class.selected]="isSeatSelected(rowIndex, seat)"
                            [disabled]="isSeatOccupied(rowIndex, seat)">
                            {{ seat }}
                        </button>
                    </div>
                </div>
            </div>

            <div class="seats-legend">
                <div class="legend-item">
                    <div class="legend-seat available"></div>
                    <span>Disponibile</span>
                </div>
                <div class="legend-item">
                    <div class="legend-seat selected"></div>
                    <span>Selezionato</span>
                </div>
                <div class="legend-item">
                    <div class="legend-seat occupied"></div>
                    <span>Occupato</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Success Modal -->
    <div class="modal-overlay" *ngIf="showSuccessModal">
        <div class="modal-box">
            <i class="fa-solid fa-circle-check success-icon"></i>
            <h2>Prenotazione completata!</h2>
            <p>I tuoi biglietti sono stati acquistati con successo.</p>
            <button (click)="showSuccessModal = false">Chiudi</button>
        </div>
    </div>
</div>
