<main>
    <section>
        <div class="Copertina">
            <img [src]="filmDetails?.copertina" alt="copertina film">
        </div>
        <article>
            <h1>{{filmDetails?.titolo}}</h1>
            <p>
                {{filmDetails?.regista}} - {{filmDetails?.durata}} Minuti - {{filmDetails?.anno}}
            </p>
            <p>{{filmDetails?.trama}}</p>

            <a href=""><img src="img/Icona-Carrello.png" alt="Acquista" class="icon">
                <span class="link-text">Acquista</span>
            </a>
        </article>

    </section>
</main>
