<main [style.backgroundImage]="'url(' + filmDetails?.copertina + ')'">
    <section>
        <div class="Copertina">
            <img [src]="filmDetails?.copertina" alt="copertina film">
        </div>
        <article>
            <h1>{{filmDetails?.titolo}}</h1>
            <p>
                Regista<b>{{filmDetails?.regista}}</b> | Durata<b>{{filmDetails?.durata}} minuti</b> |
                Anno<b>{{filmDetails?.anno}}</b>
            </p>
            <p>{{filmDetails?.trama}}</p>

            <a href=""><img src="img/Icona-Carrello.png" alt="Acquista" class="icon">
                <span class="link-text">Acquista</span>
            </a>
        </article>

    </section>
</main>
